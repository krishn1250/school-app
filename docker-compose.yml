version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: pg_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: students_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    

  app:
      build: .
      container_name: school_app
      restart: always
      depends_on:
        postgres:
          condition: service_healthy
      environment:
        DB_HOST: postgres
        DB_PORT: 5432
        DB_NAME: students_db
        DB_USER: postgres
        DB_PASSWORD: password
      ports:
        - "8000:8000"

      
volumes:
  pg_data:
